apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluentbit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluentbit-read
rules:
- apiGroups: [""]
  resources:
  - namespaces
  - pods
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluentbit-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluentbit-read
subjects:
- kind: ServiceAccount
  name: fluentbit
  namespace: default
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentbit
spec:
  selector:
    matchLabels:
      app: fluentbit
  template:
    metadata:
      labels:
        app: fluentbit
    spec:
      serviceAccountName: fluentbit
      containers:
      - name: fluentbit
        image: fluent/fluent-bit:4.1.0
        volumeMounts:
        - name: fluentbit-config
          mountPath: /fluent-bit/etc/
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
      volumes:
      - name: fluentbit-config
        configMap:
          name: fluentbit-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentbit-config
data:
  fluent-bit.conf: |
    [SERVICE]
      Flush        1
      Log_Level    info
      Daemon       off
      Parsers_File parsers.conf

    [INPUT]
      Name              tail
      Path              /var/log/containers/*.log
      Parser            docker
      Tag               kube.*
      Mem_Buf_Limit     5MB
      Skip_Long_Lines   On

    [FILTER]
      Name            kubernetes
      Match           kube.*
      Kube_URL        https://kubernetes.default.svc:443
      Kube_Tag_Prefix kube.var.log.containers.
      Merge_Log       On
      Keep_Log        Off
      K8S-Logging.Parser On
      K8S-Logging.Exclude On

    [OUTPUT]
      Name  loki
      Match *
      Host <LOGS_PUSH_URL_DOMAIN> (e.g.: logs.stackit3.argus.eu01.stackit.cloud)
      Uri  /instances/<YOUR_INSTANCE_ID>/loki/api/v1/push
      Port  443
      Http_User  <YOUR_OBSERVABILITY_API_USERNAME>
      Http_Passwd  <YOUR_OBSERVABILITY_API_PASSWORD>
      TLS   On
      Retry_Limit 5
      Labels job=fluentbit
      Label_Keys $kubernetes['namespace_name'],$kubernetes['pod_name']

  parsers.conf: |
    [PARSER]
      Name        cri
      Format      regex
      Regex       /^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<_>[^ ]+) (?<log>.*)$/
      Time_Key    time
      Time_Format %Y-%m-%dT%H:%M:%S.%L%z